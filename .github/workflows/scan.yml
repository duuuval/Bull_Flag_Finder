name: BFF Daily Scan

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install scanner dependencies
        run: npm install cheerio --no-save

      - name: Run BFF scan
        run: node scripts/scan.mjs

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/latest.json public/scans/ public/universe-fallback.json
          git diff --staged --quiet && exit 0
          git commit -m "📊 Daily scan: $(date +'%Y-%m-%d')"
          # Retry loop: if remote moved while we were running, pull --rebase and try again
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push failed, attempt $i. Pulling and retrying..."
            git pull --rebase origin main
          done
          echo "Push failed after 3 attempts"
          exit 1
