name: ⏪ Run Crypto Historical Backtest (2024)

on:
  workflow_dispatch: # Manual trigger only

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Historical Backtest
        run: |
          echo "=== Pre-run debug ==="
          pwd
          echo "--- scripts directory contents ---"
          ls -la scripts/
          echo "--- node version ---"
          node --version
          echo "--- first 5 lines of backtest script ---"
          head -5 scripts/backtest-crypto-historical.mjs
          echo "=== Running script ==="
          node scripts/backtest-crypto-historical.mjs
          echo "=== Script exited successfully ==="
